# Go API - legacy nginx stripped the /v1 prefix before proxying to :3000
# and added CORS headers; replicated here with rewrite-target + CORS annotations.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bible-go-api
  namespace: bible
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://bible-ui.rkeplin.com, https://k8s-bible-ui.rkeplin.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Origin, X-Requested-With, Content-Type, Accept, Cache-Control"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Length,Content-Range"
spec:
  tls:
    - hosts:
        - k8s-bible-go-api.rkeplin.com
        - bible-go-api.rkeplin.com
      secretName: k8s-bible-go-api-tls
  rules:
    - host: k8s-bible-go-api.rkeplin.com
      http:
        paths:
          - path: /v1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: bible-go-api
                port:
                  number: 80
    - host: bible-go-api.rkeplin.com
      http:
        paths:
          - path: /v1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: bible-go-api
                port:
                  number: 80
