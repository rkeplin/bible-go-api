apiVersion: apps/v1
kind: Deployment
metadata:
  name: bible-go-api
  namespace: bible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bible-go-api
  template:
    metadata:
      labels:
        app: bible-go-api
    spec:
      containers:
        - name: api
          image: rkeplin/bible-go-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: ES_URL
              value: http://bible-es:9200
            - name: DB_HOST
              value: bible-db
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: BIBLE_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: BIBLE_DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: BIBLE_DB_PASS
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /translations
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bible-go-api
  namespace: bible
spec:
  selector:
    app: bible-go-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
