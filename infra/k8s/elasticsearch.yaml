# Elasticsearch - search index is baked into the rkeplin/bible-es:v3-nlt2015 image.
# Same rationale as MariaDB: no PVC, data is read-only reference data.
#
# NOTE: v3 (2026-07-05) was a mis-push and got rolled back — do not reuse
# that tag. v3-nlt2015 (2026-07-06) adds the nlt2015 index on top of v2's
# data.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bible-es
  namespace: bible
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bible-es
  template:
    metadata:
      labels:
        app: bible-es
    spec:
      containers:
        - name: elasticsearch
          image: rkeplin/bible-es:v3-nlt2015
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bible-es
  namespace: bible
spec:
  selector:
    app: bible-es
  ports:
    - name: http
      port: 9200
      targetPort: 9200
